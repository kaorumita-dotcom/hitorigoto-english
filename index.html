<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="theme-color" content="#2856a3">

    <style>

            --bg: #f0f4fa;

            --primary-light: #e4ecf7;
            --primary-dark: #1a3b6e;

            --accent-light: #fdf3e0;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --border: #d8dfe8;
            --recording: #c0392b;
            --recording-light: #fdeaea;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
        header { text-align: center; padding: 30px 0 20px; }
        header h1 { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); }
        header h1 span { display: block; font-size: 0.85rem; font-weight: 400; color: var(--text-light); margin-top: 4px; letter-spacing: 0.05em; }
        .topic-card { background: var(--card); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
        .topic-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
        .topic-text { font-size: 1.15rem; font-weight: 600; color: var(--text); line-height: 1.5; }
        .topic-text-en { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }
        .new-topic-btn { margin-top: 14px; background: none; border: 1.5px solid var(--border); padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; color: var(--text-light); cursor: pointer; transition: all 0.2s; }
        .new-topic-btn:hover { border-color: var(--primary); color: var(--primary); }
        .recording-area { background: var(--card); border-radius: var(--radius); padding: 32px 24px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; transition: all 0.3s; }
        .recording-area.is-recording { border-color: var(--recording); background: var(--recording-light); box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1); }
        .timer { font-size: 3.2rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--primary-dark); margin-bottom: 6px; }
        .recording-area.is-recording .timer { color: var(--recording); }
        .timer-label { font-size: 0.8rem; color: var(--text-light); margin-bottom: 24px; }
        .time-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
        .time-btn { background: var(--primary-light); border: 1.5px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; color: var(--text-light); cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .time-btn:hover { border-color: var(--primary); color: var(--primary); }
        .time-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .recording-area.is-recording .time-btn { opacity: 0.4; pointer-events: none; }
        .record-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 1.8rem; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 4px 16px rgba(40, 86, 163, 0.3); }
        .record-btn:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(40, 86, 163, 0.4); }
        .record-btn.recording { background: var(--recording); box-shadow: 0 4px 16px rgba(192, 57, 43, 0.3); animation: pulse 1.5s infinite; }
        .record-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.3); } 50% { box-shadow: 0 0 0 14px rgba(192, 57, 43, 0); } }
        .record-btn-label { margin-top: 14px; font-size: 0.85rem; font-weight: 500; color: var(--text-light); }
        .recording-area.is-recording .record-btn-label { color: var(--recording); }
        .live-transcript { display: none; margin-top: 14px; padding: 10px 14px; background: rgba(255,255,255,0.7); border-radius: 10px; font-size: 0.82rem; color: var(--text-light); min-height: 40px; text-align: left; line-height: 1.6; }
        .recording-area.is-recording .live-transcript { display: block; }
        .results-section { display: none; }
        .results-section.visible { display: block; }
        .result-card { background: var(--card); border-radius: var(--radius); padding: 24px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .result-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .stat-box { background: var(--primary-light); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-box .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--primary-dark); }
        .stat-box .stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }
        .stat-box.cefr { background: var(--accent-light); }
        .stat-box.cefr .stat-value { color: var(--accent); }
        .feedback-item { padding: 10px 14px; border-radius: 10px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.7; }
        .feedback-good { background: var(--primary-light); border-left: 3px solid var(--primary); }
        .feedback-tip { background: #fff8f0; border-left: 3px solid var(--accent); }
        .feedback-encourage { padding: 14px; background: linear-gradient(135deg, var(--primary-light), var(--accent-light)); border-radius: 10px; margin-top: 8px; text-align: center; font-weight: 500; font-size: 0.9rem; }
        .transcript-text { font-size: 0.88rem; line-height: 1.8; color: var(--text); padding: 14px; background: var(--bg); border-radius: 10px; }
        .try-again-btn { display: block; width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(40, 86, 163, 0.2); }
        .try-again-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .error-msg { background: var(--recording-light); border: 1px solid var(--recording); border-radius: 10px; padding: 14px; font-size: 0.85rem; color: var(--recording); margin-bottom: 12px; display: none; }
        .error-msg.visible { display: block; }

        @media (max-width: 400px) { .timer { font-size: 2.6rem; } .container { padding: 12px 12px 30px; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🗣️ 独り言英会話<span>English Speaking Practice</span></h1>
    </header>

    <div class="browser-note">
        💡 このアプリはブラウザの音声認識を使用します。<strong>Chrome</strong>での使用を推奨します。
    </div>

    <div class="topic-card">

        <div class="topic-text" id="topicText"></div>
        <div class="topic-text-en" id="topicTextEn"></div>
        <button class="new-topic-btn" onclick="changeTopic()">🔄 別のトピック</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="recording-area" id="recordingArea">
        <div class="time-selector">
            <button class="time-btn" onclick="setDuration(30, this)">30秒</button>
            <button class="time-btn" onclick="setDuration(40, this)">40秒</button>
            <button class="time-btn" onclick="setDuration(50, this)">50秒</button>
            <button class="time-btn active" onclick="setDuration(60, this)">60秒</button>
        </div>
        <div class="timer" id="timer">1:00</div>
        <div class="timer-label">制限時間</div>
        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
        <div class="record-btn-label" id="recordBtnLabel">タップして開始</div>
        <div class="live-transcript" id="liveTranscript">話した内容がここに表示されます...</div>
    </div>

    <div class="results-section" id="resultsSection">
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-value" id="wpmValue">--</div>
                <div class="stat-label">語数 / 分</div>
            </div>
            <div class="stat-box cefr">
                <div class="stat-value" id="cefrValue">--</div>
                <div class="stat-label">CEFRレベル</div>
            </div>
        </div>
        <div class="result-card">
            <h3>💬 フィードバック</h3>
            <div id="feedbackContent"></div>
        </div>
        <div class="result-card">
            <h3>🎙️ あなたのスピーチ（文字起こし）</h3>
            <div class="transcript-text" id="finalTranscript"></div>
        </div>
        <button class="try-again-btn" onclick="resetApp()">🔄 もう一度チャレンジ</button>
    </div>

    <footer>実践女子大学 国際学部 英語学習ツール<br><small>&copy; 2026 Jissen Women's University, Faculty of International Studies</small></footer>
</div>

    { ja: "成功とは何か", en: "What success means to you" },

let currentTopicIndex = -1;

function shuffleTopics() {
    for (let i = topics.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [topics[i], topics[j]] = [topics[j], topics[i]];
    }
}
function changeTopic() {
    currentTopicIndex = (currentTopicIndex + 1) % topics.length;
    if (currentTopicIndex === 0) shuffleTopics();
    document.getElementById('topicText').textContent = topics[currentTopicIndex].ja;
    document.getElementById('topicTextEn').textContent = topics[currentTopicIndex].en;
}

// ============================================================
// Web Speech API Recognition — セッションID管理方式（SpeakUp Prep実装準拠）
// ============================================================
let recognition = null;
let isRecording = false;
let timerInterval = null;
let timeLeft = 60;
let duration = 60;
let finalTranscriptText = '';  // 確定済みの累積テキスト
let elapsedSeconds = 0;
let currentSessionId = 0;      // セッションID：古いセッションの結果を排除する核心

function startSession(sessionId) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition || !isRecording) return;
    // セッションIDが変わっていたら（古いセッション）は何もしない
    if (sessionId !== currentSessionId) return;

    const rec = new SpeechRecognition();
    recognition = rec;
    rec.lang = 'en-US';
    rec.continuous = false;      // 一文節ごとに自動停止（最も安定）
    rec.interimResults = true;   // 中間結果を有効化（リアルタイム表示を復活）
    rec.maxAlternatives = 1;

    rec.onresult = (event) => {
        // セッションIDチェック：古いセッションの結果は完全無視（重複防止の核心）
        if (sessionId !== currentSessionId) return;

        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscriptText += t + ' ';
            } else {
                interim += t;
            }
        }
        const liveEl = document.getElementById('liveTranscript');
        // 確定済み + 中間結果を表示（中間結果は薄いスタイルで区別）
        const confirmed = finalTranscriptText.trim();
        if (interim) {
            liveEl.innerHTML = (confirmed ? confirmed + ' ' : '') +
                '<span style="opacity:0.5;font-style:italic">' + interim + '</span>';
        } else {
            liveEl.textContent = confirmed || '話した内容がここに表示されます...';
        }
    };

    rec.onerror = (event) => {
        if (sessionId !== currentSessionId) return;
        // no-speech / aborted は無視して自動再起動
        if (event.error === 'no-speech' || event.error === 'aborted') return;
        if (event.error === 'not-allowed') {
            showError('マイクの使用が許可されていません。ブラウザの設定でマイクを許可してください。');
            forceStop();
        } else {
            console.warn('Speech recognition error:', event.error);
        }
    };

    rec.onend = () => {
        if (sessionId !== currentSessionId) return;
        // 録音中なら、abort完了を待って150ms後に再起動（競合防止）
        if (isRecording) {
            setTimeout(() => {
                if (isRecording && sessionId === currentSessionId) {
                    startSession(sessionId);
                }
            }, 150);
        }
    };

    try {
        rec.start();
    } catch(e) {
        console.warn('recognition start error:', e);
    }
}

function setDuration(sec, btn) {
    if (isRecording) return;
    duration = sec;
    timeLeft = sec;
    updateTimerDisplay();
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function toggleRecording() {
    isRecording ? stopRecording() : startRecording();
}

function startRecording() {
    hideError();

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        showError('お使いのブラウザは音声認識に対応していません。Google Chromeをお使いください。');
        return;
    }

    finalTranscriptText = '';
    elapsedSeconds = 0;
    timeLeft = duration;

    // 新しいセッションIDを発行（古いセッションの結果を自動無効化）
    const newSessionId = currentSessionId + 1;
    currentSessionId = newSessionId;

    isRecording = true;

    // abort完了を待って150ms後に開始（競合防止）
    setTimeout(() => {
        startSession(newSessionId);
    }, 150);

    // UI
    document.getElementById('recordingArea').classList.add('is-recording');
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordBtn').textContent = '⏹';
    document.getElementById('recordBtnLabel').textContent = '話してください！ タップで終了';
    document.getElementById('liveTranscript').textContent = '話した内容がここに表示されます...';
    document.getElementById('resultsSection').classList.remove('visible');

    updateTimerDisplay();
    timerInterval = setInterval(() => {
        elapsedSeconds++;
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) stopRecording();
    }, 1000);
}

function stopRecording() {
    isRecording = false;  // 先に falseにすることで startSession の再起動が呼ばれなくなる
    currentSessionId += 1; // セッションIDをインクリメントして古いセッションを完全無効化
    clearInterval(timerInterval);

    if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
    }

    document.getElementById('recordingArea').classList.remove('is-recording');
    const btn = document.getElementById('recordBtn');
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    btn.disabled = true;
    document.getElementById('recordBtnLabel').textContent = '処理中...';

    // 少し待ってから結果表示（最後のonresultが来るのを待つ）
    setTimeout(() => showResults(), 600);
}

function forceStop() {
    isRecording = false;
    currentSessionId += 1; // セッションを無効化
    clearInterval(timerInterval);
    if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
    }
    document.getElementById('recordingArea').classList.remove('is-recording');
    const btn = document.getElementById('recordBtn');
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    btn.disabled = false;
    document.getElementById('recordBtnLabel').textContent = 'タップして開始';
}

// ============================================================
// Results
// ============================================================
function showResults() {
    const transcript = finalTranscriptText.trim();

    if (!transcript) {
        showError('音声を認識できませんでした。もう少し大きな声で、はっきりと話してみてください。');
        const btn = document.getElementById('recordBtn');
        btn.disabled = false;
        document.getElementById('recordBtnLabel').textContent = 'タップして開始';
        return;
    }

    const elapsed = elapsedSeconds > 0 ? elapsedSeconds : duration;
    const wc = countWords(transcript);
    const wpm = elapsed > 0 ? Math.round((wc / elapsed) * 60) : 0;
    const cefr = estimateCEFR(wpm, transcript);

    document.getElementById('wpmValue').textContent = wpm;
    document.getElementById('cefrValue').textContent = cefr;
    document.getElementById('finalTranscript').textContent = transcript;
    document.getElementById('feedbackContent').innerHTML = buildFeedback(wpm, cefr, wc, transcript);

    document.getElementById('resultsSection').classList.add('visible');
    const btn = document.getElementById('recordBtn');
    btn.disabled = false;
    document.getElementById('recordBtnLabel').textContent = 'タップして開始';
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// Rule-based feedback (no API, no cost)
// ============================================================
function buildFeedback(wpm, cefr, wc, transcript) {
    const goodPoints = [];
    const tips = [];

    // 語数・流暢さ
    if (wpm >= 100) {
        goodPoints.push('スピーキングのスピードがとても良いです！ネイティブに近いペースで話せています。');
    } else if (wpm >= 60) {
        goodPoints.push('適切なペースで話せています。焦らず自分のリズムで続けましょう。');
    } else if (wpm >= 30) {
        goodPoints.push('まずは話し始めることができました。練習を重ねるとどんどん流暢になります！');
        tips.push('もう少しスピードを上げてみましょう。目標は60 WPM以上です。');
    } else {
        goodPoints.push('英語で話す練習を始めたことが大切です。続けることで必ず上達します！');
        tips.push('単語だけでも良いので、とにかく声に出す練習を続けましょう。');
    }

    // 語彙の多様性
    const words = transcript.toLowerCase().split(/\s+/).filter(w => w.length > 0);
    const uniqueWords = new Set(words);
    const lexDiv = wc > 0 ? uniqueWords.size / wc : 0;

    if (lexDiv >= 0.7 && wc >= 20) {
        goodPoints.push('様々な語彙を使えています。語彙力が高いことが伝わります。');
    } else if (lexDiv >= 0.5 && wc >= 10) {
        goodPoints.push('いくつかの異なる表現を使えています。');
        tips.push('同じ単語の繰り返しを減らすと、より自然な英語になります。');
    } else if (wc >= 5) {
        tips.push('知っている単語をもっと使ってみましょう。例えば形容詞や副詞を加えると表現が豊かになります。');
    }

    // 文の長さ（文字数÷語数で平均単語長）
    const avgWordLen = wc > 0 ? transcript.replace(/\s+/g, '').length / wc : 0;
    if (avgWordLen >= 5.0 && wc >= 15) {
        goodPoints.push('長めの単語も使えており、語彙の幅が感じられます。');
    }

    // CEFRレベル別メッセージ
    let encourage = '';
    if (cefr === 'B2') {
        encourage = '素晴らしい！B2レベルの英語力を発揮できています。このまま継続して、さらに上を目指しましょう！';
    } else if (cefr === 'B1') {
        encourage = 'B1レベルに達しています。日常会話は十分にこなせるレベルです。もう一歩でB2！';
    } else if (cefr === 'A2') {
        encourage = 'A2レベルです。基本的な表現が使えています。もっと練習してB1を目指しましょう！';
    } else if (cefr === 'A1') {
        encourage = 'A1レベルです。英語で話し始めることができています。毎日少しずつ練習しましょう！';
    } else {
        encourage = '英語で話す練習を始めたことが第一歩です。毎日続けることで必ず上達します！';
    }

    // HTML構築
    let html = '';
    if (goodPoints.length > 0) {
        html += '<h3 style="font-size:0.9rem;font-weight:600;margin-bottom:10px;">✨ 良かった点</h3>';
        goodPoints.forEach(p => {
            html += `<div class="feedback-item feedback-good">${esc(p)}</div>`;
        });
    }
    if (tips.length > 0) {
        html += '<h3 style="font-size:0.9rem;font-weight:600;margin-top:16px;margin-bottom:10px;">📝 アドバイス</h3>';
        tips.forEach(t => {
            html += `<div class="feedback-item feedback-tip">${esc(t)}</div>`;
        });
    }
    html += `<div class="feedback-encourage">💪 ${esc(encourage)}</div>`;
    return html;
}

// ============================================================
// CEFR estimation
// ============================================================
function countWords(t) {
    return t.trim().split(/\s+/).filter(w => w.length > 0).length;
}

function estimateCEFR(wpm, transcript) {
    const wc = countWords(transcript);
    const uw = new Set(transcript.toLowerCase().split(/\s+/)).size;
    const ld = uw / Math.max(wc, 1);
    const awl = transcript.replace(/\s+/g, '').length / Math.max(wc, 1);
    let s = 0;
    if (wpm >= 130) s += 5; else if (wpm >= 110) s += 4; else if (wpm >= 90) s += 3; else if (wpm >= 60) s += 2; else if (wpm >= 30) s += 1;
    if (ld >= 0.75) s += 3; else if (ld >= 0.6) s += 2; else if (ld >= 0.45) s += 1;
    if (awl >= 5.5) s += 2; else if (awl >= 4.5) s += 1;
    if (s >= 9) return 'B2';
    if (s >= 7) return 'B1';
    if (s >= 5) return 'A2';
    if (s >= 3) return 'A1';
    return 'Pre-A1';
}

// ============================================================
// Utilities
// ============================================================
function esc(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
function showError(m) {
    const e = document.getElementById('errorMsg');
    e.textContent = m;
    e.classList.add('visible');
}
function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
}
function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function resetApp() {
    document.getElementById('resultsSection').classList.remove('visible');
    timeLeft = duration;
    updateTimerDisplay();
    const btn = document.getElementById('recordBtn');
    btn.disabled = false;
    document.getElementById('recordBtnLabel').textContent = 'タップして開始';
    changeTopic();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
shuffleTopics();
changeTopic();
</script>
